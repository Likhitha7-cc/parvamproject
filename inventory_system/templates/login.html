<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Parvam SaaS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <div style="display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 12px; background-color: var(--primary); color: white; margin-bottom: 16px;">
                <i data-feather="box"></i>
            </div>
            <h1>Welcome back</h1>
            <p>Please enter your details to sign in.</p>
        </div>

        {% if error %}
        <div class="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                Sign In
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted);">
            Don't have an account? <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 500;">Contact IT Support</a>
        </p>
    </div>

    <script>
        feather.replace()
    </script>
</body>
</html>
